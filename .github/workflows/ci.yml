name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: markethub
          POSTGRES_PASSWORD: markethub
          POSTGRES_DB: markethub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U markethub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://markethub:markethub@localhost:5432/markethub?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_change_me
      JWT_REFRESH_SECRET: ci_refresh_secret_change_me

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @markethub/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: DB migrate (deploy)
        run: pnpm --filter @markethub/api exec prisma migrate deploy

      - name: Test
        run: pnpm test
